; docker/couchdb/local.ini
; CouchDB configuration for Terraflow Studio

[couchdb]
single_node = true

[chttpd]
bind_address = 0.0.0.0
port = 5984

[httpd]
enable_cors = true

[cors]
origins = *
credentials = true
methods = GET, PUT, POST, HEAD, DELETE
headers = accept, authorization, content-type, origin, referer

[log]
level = warning
